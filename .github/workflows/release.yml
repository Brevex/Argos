name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev rpm

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cargo tauri build

      - name: Generate checksums
        run: |
          cd target/release/bundle
          for f in deb/*.deb rpm/*.rpm; do
            sha256sum "$f" > "${f}.sha256"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: argos-linux
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/deb/*.sha256
            target/release/bundle/rpm/*.rpm
            target/release/bundle/rpm/*.sha256

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0'

      - name: Install frontend dependencies
        run: cd frontend; npm ci

      - name: Build
        run: cargo tauri build

      - name: Generate checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "target/release/bundle/nsis/*.exe"
          foreach ($file in $files) {
            $hash = Get-FileHash -Path $file.FullName -Algorithm SHA256
            $hash.Hash | Out-File -FilePath "$($file.FullName).sha256"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: argos-windows
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sha256

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: argos-linux
          path: artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: argos-windows
          path: artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Argos ${{ github.ref_name }}
          body: |
            ## Argos ${{ github.ref_name }}

            ### Installers
            - **Windows**: `Argos_x64-setup.exe` (NSIS, per-machine install).
            - **Debian/Ubuntu**: `sudo dpkg -i Argos_*.deb`
            - **Fedora/openSUSE**: `sudo rpm -i Argos-*.rpm`

            ### Integrity
            SHA-256 checksums are provided alongside each artifact.

            ### Privileges
            Argos requires administrator/root privileges on every launch to access raw block devices.
            - **Windows**: an embedded application manifest triggers UAC automatically each time the binary starts. No additional setup is needed after install.
            - **Linux**: launching from the application menu invokes `pkexec` via the installed `.desktop` entry. The Polkit action `com.argos.run` (installed at `/usr/share/polkit-1/actions/com.argos.policy`) prompts for an administrator password; the credential is kept for the active session.
            - **Unsupported**: macOS is not produced in this release; see ADR 0009.
          files: |
            artifacts/linux/**/*.deb
            artifacts/linux/**/*.deb.sha256
            artifacts/linux/**/*.rpm
            artifacts/linux/**/*.rpm.sha256
            artifacts/windows/**/*.exe
            artifacts/windows/**/*.exe.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
