name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy,rustfmt

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev rpm

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Lint Rust
        run: cargo clippy --all-targets -- -D warnings

      - name: Test Rust
        run: cargo test --all-targets

      - name: Test Rust release profile
        run: cargo test --release --all-targets

      - name: Build frontend
        run: npm --prefix frontend run build

  publish:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.85.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev rpm

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Argos ${{ github.ref_name }}
          releaseBody: |
            Argos desktop installers for Linux and Windows.

            Windows builds require administrator privileges through the embedded application manifest. Linux packages install the desktop entry and Polkit policy required for raw-device access. macOS is intentionally not published for this release line.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
